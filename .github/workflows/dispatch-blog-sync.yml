name: Dispatch Blog Sync

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dispatch blog sync events
        env:
          BLOG_REPO_DISPATCH_TOKEN: ${{ secrets.BLOG_REPO_DISPATCH_TOKEN }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
          SYNCED_AT: ${{ github.event.head_commit.timestamp }}
        run: |
          set -euo pipefail

          if [ -z "${BLOG_REPO_DISPATCH_TOKEN:-}" ]; then
            echo "BLOG_REPO_DISPATCH_TOKEN is required." >&2
            exit 1
          fi

          zero_sha="0000000000000000000000000000000000000000"
          if [ "${BEFORE_SHA:-}" = "$zero_sha" ] || [ -z "${BEFORE_SHA:-}" ]; then
            changed_files="$(git show --pretty='' --name-only "$AFTER_SHA")"
          else
            changed_files="$(git diff --name-only --diff-filter=AM "$BEFORE_SHA" "$AFTER_SHA")"
          fi

          submission_files="$(printf '%s\n' "$changed_files" | grep '/submission-.*\.[^/]*$' || true)"
          if [ -z "$submission_files" ]; then
            echo "No changed submission files detected."
            exit 0
          fi

          echo "Detected submission files:"
          printf '%s\n' "$submission_files"

          sync_timestamp="${SYNCED_AT:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"

          dispatch_with_body() {
            local label="$1"
            local url="$2"
            local payload="$3"
            local response_file
            local http_code

            response_file="$(mktemp)"
            http_code="$(curl -sS -o "$response_file" -w '%{http_code}' \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $BLOG_REPO_DISPATCH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$url" \
              -d "$payload")"

            if [ "$http_code" = "200" ] || [ "$http_code" = "201" ] || [ "$http_code" = "202" ] || [ "$http_code" = "204" ]; then
              echo "$label succeeded with HTTP $http_code."
              if [ -s "$response_file" ]; then
                cat "$response_file"
              fi
              rm -f "$response_file"
              return 0
            fi

            echo "$label failed with HTTP $http_code." >&2
            if [ -s "$response_file" ]; then
              cat "$response_file" >&2
            fi
            rm -f "$response_file"
            return 1
          }

          while IFS= read -r file_path; do
            [ -z "$file_path" ] && continue

            problem_slug="$(basename "$(dirname "$file_path")")"
            extension="${file_path##*.}"

            case "$extension" in
              py) language="python" ;;
              js) language="javascript" ;;
              ts) language="typescript" ;;
              java) language="java" ;;
              cpp) language="cpp" ;;
              cs) language="csharp" ;;
              go) language="go" ;;
              rs) language="rust" ;;
              kt) language="kotlin" ;;
              swift) language="swift" ;;
              sql) language="sql" ;;
              *) language="$extension" ;;
            esac

            workflow_dispatch_payload="$(jq -nc \
              --arg ref "release" \
              --arg problem_slug "$problem_slug" \
              --arg language "$language" \
              --arg submission_path "$file_path" \
              --arg source_sha "$SOURCE_SHA" \
              --arg synced_at "$sync_timestamp" \
              '{
                ref: $ref,
                inputs: {
                  problem_slug: $problem_slug,
                  language: $language,
                  submission_path: $submission_path,
                  source_sha: $source_sha,
                  synced_at: $synced_at
                }
              }')"

            repository_dispatch_payload="$(jq -nc \
              --arg event_type "neetcode_submission_synced" \
              --arg problem_slug "$problem_slug" \
              --arg language "$language" \
              --arg submission_path "$file_path" \
              --arg source_repo "$SOURCE_REPO" \
              --arg source_sha "$SOURCE_SHA" \
              --arg synced_at "$sync_timestamp" \
              '{
                event_type: $event_type,
                client_payload: {
                  problem_slug: $problem_slug,
                  language: $language,
                  submission_path: $submission_path,
                  source_repo: $source_repo,
                  source_sha: $source_sha,
                  synced_at: $synced_at
                }
              }')"

            if dispatch_with_body \
              "workflow_dispatch for $file_path" \
              "https://api.github.com/repos/devbattery/devbattery.github.io/actions/workflows/sync-neetcode-post.yml/dispatches" \
              "$workflow_dispatch_payload"; then
              continue
            fi

            echo "workflow_dispatch was rejected. Trying repository_dispatch." >&2

            dispatch_with_body \
              "repository_dispatch for $file_path" \
              "https://api.github.com/repos/devbattery/devbattery.github.io/dispatches" \
              "$repository_dispatch_payload"
          done <<< "$submission_files"
